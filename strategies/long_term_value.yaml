# Long Term Value Strategy / 长期价值分析

name: long_term_value
display_name: 长期价值
description: 以价值投资视角评估公司长期持有价值，关注护城河、盈利质量、估值安全边际，不做短线择时。
category: framework
core_rules: [2, 3]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - search_stock_news
aliases: [价值, 价值投资, 长期, 长期价值, 基本面, 长线]
default_priority: 60
market_regimes: [trending_up, ranging, trending_down]

instructions: |
  **长期价值策略（Long Term Value Strategy）**

  适用场景：
  - 评估一家公司是否值得长期持有（1-3年以上视角）。
  - 不关注短期股价波动和技术形态，只关注业务质量和安全边际。
  - 适合价值投资者筛选和复核持仓逻辑。

  分析框架（按优先级依次执行）：

  1. **护城河评估（最重要）**
     - 品牌护城河：产品是否有定价权，用户粘性高吗？
     - 规模护城河：规模越大成本越低吗（规模效应）？
     - 转换成本：客户更换竞争对手的成本高吗？
     - 网络效应：用户越多产品越有价值吗？
     - 资源/牌照壁垒：是否占有稀缺资源或特许经营权？
     - 若护城河不明确，直接降低评分，说明竞争风险。

  2. **盈利质量（财务健康）**
     - ROE 连续多年是否稳定在 15% 以上（越高越好）。
     - 经营现金流是否持续为正且接近净利润（排除应收款虚增利润）。
     - 毛利率趋势：是否稳定甚至扩张（反映定价权）。
     - 资产负债率：有息负债是否可控，避免高杠杆企业。
     - 若 ROE 依赖高杠杆而非高利润率，明确提示风险。

  3. **成长持续性**
     - 收入增长是否来自主业扩张，而非并购或一次性收入。
     - 行业天花板是否还有空间（TAM 够大吗）。
     - 管理层是否有良好的资本分配记录（分红、回购 vs 盲目扩张）。
     - 若成长依赖政策补贴或单一大客户，明确提示依赖风险。

  4. **估值安全边际**
     - 结合当前 PE/PB 判断是否在历史合理区间或低位。
     - PE 高于行业均值 50% 以上时，需要成长加速来支撑，否则提示高估风险。
     - PB < 1 且 ROE 持续为正，通常是安全边际较高的信号。
     - 不追求"便宜"但要求"合理"，优质公司合理价买入优于普通公司便宜价买入。

  5. **风险因素排查**
     - 行业监管风险（政策依赖型行业）。
     - 核心人员/技术集中风险。
     - 大股东减持、商誉减值风险。
     - 近期有无重大负面事件或诉讼。

  输出格式：
  - **护城河**：强 / 中等 / 弱，说明来源
  - **盈利质量**：优质 / 一般 / 存疑，核心指标依据
  - **成长空间**：充足 / 有限 / 见顶
  - **当前估值**：低估 / 合理 / 高估
  - **长期持有评级**：✅ 值得持有 / ⚠️ 继续观察 / ❌ 回避
  - **核心逻辑**：一段话说清楚为什么值得（或不值得）长期持有
  - **主要风险**：1-3条最关键风险点

  评分调整建议：
  - 护城河清晰 + ROE>15% + 现金流健康：`sentiment_score +20`
  - 估值处于历史低位合理区间：`sentiment_score +10`
  - 成长空间充足且管理层诚信记录良好：`sentiment_score +8`
  - 护城河模糊或行业竞争激烈：`sentiment_score -10`
  - ROE 依赖高杠杆或现金流持续弱于利润：`sentiment_score -12`
  - 估值明显高估（PE 超历史 80 分位）：`sentiment_score -10`
  - 存在监管/大客户/减持重大风险：`sentiment_score -15`
