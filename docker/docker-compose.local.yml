version: '3.8'

# 本地开发/运行配置，与 ECS 的 docker-compose.yml 完全独立。
# 启动：bash deploy-local.sh
# 停止：docker compose -f docker/docker-compose.local.yml down

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file:
    - ../.env.local
  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    - ../longbridge_tokens:/home/dsa/.longbridge
    # 直接挂载本机 Claude 登录态，无需重新登录
    - ~/.claude:/home/dsa/.claude
  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  server:
    <<: *common
    container_name: stock-server-local
    command: ["python", "main.py", "--serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
